<main class="access-shell" *ngIf="!cargando && comercio; else loadingState">
  <section class="access-card" [style.--brand-primary]="comercio.color_primario" [style.--brand-secondary]="comercio.color_secundario">
    <div class="access-card-header">
      <span class="eyebrow">Mi cuenta</span>
      <h1>{{ comercio.nombre }}</h1>
      <p class="subtitle">Ingresa tu telefono y entra sin contraseña. Si eres nuevo, te creamos tu cuenta al instante.</p>
    </div>

    <div class="access-card-body">
      <label for="telefono" class="label">Tu numero de telefono</label>
      <input
        id="telefono"
        type="tel"
        inputmode="numeric"
        maxlength="10"
        [value]="telefono"
        (input)="onTelefonoInput($event)"
        placeholder="0987654321"
        class="phone-input"
      />

      <button type="button" class="primary-btn" [disabled]="buscando" (click)="buscarCuenta()">
        {{ buscando ? 'Buscando...' : 'Ver mi tarjeta de fidelidad' }}
      </button>

      <p *ngIf="mensaje" class="feedback">{{ mensaje }}</p>

      <a routerLink="/" class="back-link">Volver al inicio</a>
    </div>
  </section>
</main>

<ng-template #loadingState>
  <main class="access-shell">
    <section class="access-card">
      <div class="access-card-body">
        <p>{{ mensaje || 'Cargando...' }}</p>
      </div>
    </section>
  </main>
</ng-template>
